bad:
  name: BMad Autonomous Development
  description: Orchestrates parallel BMad story implementation pipelines — automatically
    runs bmad-create-story, bmad-dev-story, bmad-code-review, and commit/PR in batches,
    driven by the sprint backlog and dependency graph
  version: 1.0.0
  max_parallel_stories: '3'
  worktree_base_path: .worktrees
  auto_pr_merge: false
  run_ci_locally: false
  wait_timer_seconds: '3600'
  retro_timer_seconds: '600'
  context_compaction_threshold: '80'
  timer_support: false
  model_standard: gemini-3.0-flash
  model_quality: gemini-3.0-pro
  api_usage_threshold: '80'
